version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: yeka-postgres
    restart: always
    environment:
      POSTGRES_USER: yeka_user
      POSTGRES_PASSWORD: yeka_password
      POSTGRES_DB: yeka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
