version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: yeka-postgres
    restart: always
    environment:
      POSTGRES_USER: yeka_user
      POSTGRES_PASSWORD: yeka_password
      POSTGRES_DB: yeka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yeka-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://yeka_user:yeka_password@postgres:5432/yeka?schema=public
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yeka-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
